version: "3.1"

rules:

# ================== GREETING ==================
- rule: greet user
  steps:
    - intent: greet
    - action: utter_greet

# ================== GOODBYE ==================
- rule: say goodbye
  steps:
    - intent: goodbye
    - action: utter_goodbye

# ================== FALLBACK ==================
- rule: fallback
  steps:
    - intent: nlu_fallback
    - action: utter_fallback

# ================== FORM KÍCH HOẠT ==================
- rule: activate recommend form
  steps:
    - intent: ask_laptop_recommend
    - action: action_recommend_laptop

# ================== ASK CONTACT ==================
- rule: contact info
  steps:
    - intent: ask_contact
    - action: utter_ask_contact

# ================== STORE INFO ==================
- rule: store info
  steps:
    - intent: ask_store_info
    - action: utter_store_info

# ================== PAYMENT ==================
- rule: payment info
  steps:
    - intent: ask_payment
    - action: utter_payment

# ================== PROMOTION ==================
- rule: promotion info
  steps:
    - intent: ask_promotion
    - action: utter_promotion

# ================== SHIPPING ==================
- rule: shipping info
  steps:
    - intent: ask_shipping
    - action: utter_ask_shipping

# ================== WARRANTY ==================
- rule: warranty info
  steps:
    - intent: ask_warranty
    - action: utter_ask_warranty

# ================== AVAILABILITY ==================
- rule: check availability
  steps:
    - intent: ask_availability
    - action: utter_ask_availability

# ================== BUY INTENT ==================
- rule: handle buy intent
  steps:
    - intent: buy_intent
    - action: action_request_purchase_confirmation

# ================== AFFIRM PURCHASE ==================
- rule: confirm purchase when user affirms
  steps:
    - intent: affirm
    - slot_was_set:
        - awaiting_purchase_confirmation: true
    - action: action_confirm_purchase

# ================== DENY PURCHASE ==================
- rule: cancel purchase when user denies
  steps:
    - intent: deny
    - slot_was_set:
        - awaiting_purchase_confirmation: true
    - action: action_exchange_laptop

# ================== SELECT LAPTOP ==================
- rule: select specific laptop
  steps:
    - intent: select_laptop
    - action: action_select_laptop

# ================== EXCHANGE LAPTOP ==================
- rule: exchange laptop
  steps:
    - intent: ask_exchange_laptop
    - action: action_exchange_laptop

# ================== SHOW RECOMMENDATIONS ==================
- rule: show recommendation list when asked
  steps:
    - intent: ask_where_recommend
    - action: utter_recommend_list

# ================== MORE INFO ==================
- rule: more info
  steps:
    - intent: ask_more_info
    - action: utter_ask_more